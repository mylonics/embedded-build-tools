name: Check for Tool Updates

on:
  schedule:
    # Run weekly on Mondays at 08:00 UTC
    - cron: '0 8 * * 1'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (check only, no PR)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write

jobs:
  check-updates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Check for updates
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/check_updates.py --output updates.json

      - name: Read update results
        id: results
        run: |
          if [ -f updates.json ]; then
            HAS_UPDATES=$(python3 -c "import json; d=json.load(open('updates.json')); print('true' if d.get('has_updates') else 'false')")
            echo "has_updates=$HAS_UPDATES" >> "$GITHUB_OUTPUT"
            SUMMARY=$(python3 -c "import json; d=json.load(open('updates.json')); print(d.get('summary','No updates'))")
            echo "summary<<EOF" >> "$GITHUB_OUTPUT"
            echo "$SUMMARY" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          else
            echo "has_updates=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Apply updates to manifest
        if: steps.results.outputs.has_updates == 'true' && inputs.dry_run != 'true'
        run: python scripts/check_updates.py --apply

      - name: Create Pull Request
        if: steps.results.outputs.has_updates == 'true' && inputs.dry_run != 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update tool versions"
          title: "chore: update embedded build tools"
          body: |
            Automated tool version update.
            
            ${{ steps.results.outputs.summary }}
            
            ---
            *This PR was automatically created by the update checker workflow.*
          branch: auto-update/tools
          delete-branch: true
          labels: dependencies,automated

      - name: Summary
        run: |
          echo "### Update Check Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.results.outputs.has_updates }}" = "true" ]; then
            echo "✅ Updates available:" >> $GITHUB_STEP_SUMMARY
            echo "${{ steps.results.outputs.summary }}" >> $GITHUB_STEP_SUMMARY
          else
            echo "No updates found. All tools are at their latest versions." >> $GITHUB_STEP_SUMMARY
          fi
